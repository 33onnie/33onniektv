<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🎤 珊珊點歌台</title>

<style>
body {
  margin: 0;
  font-family: "微軟正黑體";
  background: rgba(20,20,20,0.5);
  color: white;
}

.container {
  width: 320px;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 18px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* 標題 */
.title {
  text-align: center;
  font-size: 18px;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

/* 現在播放 */
.nowPlaying {
  text-align: center;
  font-size: 14px;
  margin-bottom: 10px;
  color: #ffd6ec;
}

/* 清單 */
ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

li {
  font-size: 13px;
  padding: 6px;
  margin: 4px 0;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  opacity: 0.6;
}

/* 當前歌曲 */
.now {
  background: rgba(255,255,255,0.15);
  font-weight: bold;
  opacity: 1;
}

/* emoji icon */
.icon {
  margin-right: 5px;
}
</style>

</head>

<body>

<div class="container">

<div class="title">🎤 點歌清單 💖</div>

<div id="nowPlaying" class="nowPlaying"></div>

<ul id="list"></ul>

</div>

<script>
function render() {
  let queue = JSON.parse(localStorage.getItem("queue") || "[]");
  let index = parseInt(localStorage.getItem("index") || "0");

  const list = document.getElementById("list");
  const nowDiv = document.getElementById("nowPlaying");

  list.innerHTML = "";

  if (queue[index]) {
    nowDiv.innerText = `🎵 現在播放：${queue[index].name}`;
  }

  queue.forEach((q, i) => {
    let li = document.createElement("li");

    li.innerHTML = `
      <span>
        ${i === index ? "🎵" : "💿"} ${q.name}
      </span>
      <span>👤</span>
    `;

    if (i === index) li.classList.add("now");

    list.appendChild(li);
  });
}

setInterval(render, 1000);
</script>

</body>
</html>
