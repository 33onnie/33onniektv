<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>珊珊點歌台 🎤</title>

<style>
body {
  background: #1a001f;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

h1 {
  color: pink;
}

input {
  padding: 10px;
  width: 300px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  background: pink;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#queue {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎤 珊珊歐餒醬點歌台 💖</h1>

<input id="songInput" placeholder="貼YouTube連結">
<button onclick="addSong()">點歌 🎶</button>

<h2>📋 播放清單</h2>
<ul id="queue"></ul>

<div id="player"></div>

<script>
let queue = [];
let currentIndex = 0;

function addSong() {
  const input = document.getElementById("songInput").value;
  if (!input) return;

  queue.push(input);
  renderQueue();
  document.getElementById("songInput").value = "";

  if (queue.length === 1) {
    playSong();
  }
}

function renderQueue() {
  const list = document.getElementById("queue");
  list.innerHTML = "";

  queue.forEach((song, index) => {
    const li = document.createElement("li");
    li.innerText = (index === currentIndex ? "▶️ " : "") + song;
    list.appendChild(li);
  });
}

function playSong() {
  if (currentIndex >= queue.length) return;

  let url = queue[currentIndex];
  let videoId = extractVideoID(url);

  if (!videoId) {
    alert("請貼YouTube連結！");
    return;
  }

  document.getElementById("player").innerHTML = `
    <iframe width="560" height="315"
    src="https://www.youtube.com/embed/${videoId}?autoplay=1"
    frameborder="0" allow="autoplay"></iframe>
  `;
}

function extractVideoID(url) {
  const reg = /v=([^&]+)/;
  const match = url.match(reg);
  return match ? match[1] : null;
}
</script>

</body>
</html>
