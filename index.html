<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>珊珊點歌小工具 💖</title>

<style>
body {
  margin: 0;
  font-family: "微軟正黑體";
  background: rgba(30,30,30,0.6);
  color: #f5f5f5;
}

.container {
  width: 300px;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

h3 {
  margin: 5px 0;
  text-align: center;
  font-weight: 500;
  color: #e8dce6;
}

input {
  width: 100%;
  margin: 4px 0;
  padding: 6px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

button {
  width: 100%;
  padding: 7px;
  margin-top: 5px;
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: rgba(255,255,255,0.35);
}

#queue {
  margin-top: 10px;
  max-height: 120px;
  overflow-y: auto;
}

li {
  font-size: 13px;
  margin: 4px 0;
  opacity: 0.6;
  transition: all 0.3s;
}

.now {
  color: #ffffff;
  font-weight: bold;
  font-size: 15px;
  opacity: 1;
}

.new {
  animation: slideIn 0.4s ease;
}

@keyframes slideIn {
  from {
    transform: translateX(40px);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}
</style>
</head>

<body>

<div class="container">

<h3>🎤 點歌清單</h3>

<input id="nameInput" placeholder="名字">
<input id="songInput" placeholder="YouTube連結">

<button onclick="addSong()">加入清單</button>

<ul id="queue"></ul>

<button onclick="nextSong()">⏭ 下一首</button>

</div>

<script>
let queue = [];
let currentIndex = 0;

function addSong() {
  const name = document.getElementById("nameInput").value || "匿名";
  const song = document.getElementById("songInput").value;

  if (!song) return;

  queue.push({ name, song });
  renderQueue(true);

  document.getElementById("songInput").value = "";

  if (queue.length === 1) playSong();
}

function renderQueue(isNew = false) {
  const list = document.getElementById("queue");
  list.innerHTML = "";

  queue.forEach((item, index) => {
    const li = document.createElement("li");

    li.innerText = `${index === currentIndex ? "▶️ " : ""}${item.name}`;

    if (index === currentIndex) li.classList.add("now");
    if (isNew && index === queue.length - 1) li.classList.add("new");

    list.appendChild(li);
  });
}

function playSong() {
  if (currentIndex >= queue.length) return;

  let url = queue[currentIndex].song;
  let id = url.match(/v=([^&]+)/);

  if (!id) return;

  let iframe = document.createElement("iframe");
  iframe.src = `https://www.youtube.com/embed/${id[1]}?autoplay=1`;
  iframe.style.display = "none";

  document.body.appendChild(iframe);
}

function nextSong() {
  currentIndex++;
  renderQueue();
  playSong();
}
</script>

</body>
</html>
