<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>🎤 珊珊點歌區 💖</title>

<style>
body {
  font-family: "微軟正黑體";
  background: linear-gradient(135deg, #1f1f1f, #2b2b2b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  backdrop-filter: blur(10px);
}

h2 {
  margin-bottom: 15px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #ff77cc;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.msg {
  margin-top: 10px;
  font-size: 14px;
  color: #ffd6f0;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎤 點歌區 💖</h2>

  <input id="name" placeholder="你的名字 👤">
  <input id="url" placeholder="貼 YouTube 連結 🎶">

  <button onclick="send()">送出點歌</button>

  <div id="msg" class="msg"></div>
</div>

<script>
function send() {
  let name = document.getElementById("name").value || "匿名";
  let url = document.getElementById("url").value;

  if (!url) {
    alert("請貼 YouTube 連結！");
    return;
  }

  let queue = JSON.parse(localStorage.getItem("queue") || "[]");

  queue.push({
    name: name,
    url: url
  });

  localStorage.setItem("queue", JSON.stringify(queue));

  document.getElementById("msg").innerText = "💖 點歌成功！";
  
  document.getElementById("url").value = "";
}
</script>

</body>
</html>
