<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>珊珊KTV 💖</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: "微軟正黑體";
}

#lyrics {
  position: absolute;
  bottom: 80px;
  width: 100%;
  text-align: center;
}

.line {
  font-size: 36px;
  color: rgba(255,255,255,0.4);
}

.active {
  font-size: 52px;
  color: #ff66cc;
  font-weight: bold;
  text-shadow: 0 0 20px #ff99dd;
}
</style>
</head>

<body>

<div id="lyrics">🎤 準備開唱 💖</div>

<script>
let lyrics = [];
let startTime = 0;

function parseLRC(lrc) {
  const lines = lrc.split("\n");
  lyrics = [];

  lines.forEach(line => {
    const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (match) {
      const min = parseInt(match[1]);
      const sec = parseFloat(match[2]);
      const time = min * 60 + sec;

      lyrics.push({ time, text: match[3] });
    }
  });
}

function startLyrics() {
  startTime = Date.now();

  setInterval(() => {
    const t = (Date.now() - startTime) / 1000;

    let current = lyrics.findLast(l => t >= l.time);

    document.getElementById("lyrics").innerHTML =
      lyrics.map(l =>
        `<div class="${l === current ? 'active' : 'line'}">${l.text}</div>`
      ).join("");
  }, 300);
}

// 👉 範例（告白氣球 LRC）
const lrcText = `
[00:02.00] 塞納河畔 左岸的咖啡
[00:06.00] 我手一杯 品嚐你的美
[00:10.00] 留下唇印的嘴
[00:14.00] 花店玫瑰 名字寫錯誰
[00:18.00] 告白氣球 風在吹
[00:22.00] 對你說愛你
`;

parseLRC(lrcText);
startLyrics();
</script>

</body>
</html>
