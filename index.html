<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>珊珊點歌小工具 💖</title>

<style>
body {
  margin: 0;
  font-family: "微軟正黑體";
  background: rgba(30,30,30,0.6);
  color: #f5f5f5;
}

.container {
  width: 300px;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  backdrop-filter: blur(10px);
  position: relative;
}

h3 { text-align: center; }

input, button {
  width: 100%;
  margin: 4px 0;
  padding: 6px;
  border-radius: 8px;
  border: none;
}

button {
  background: rgba(255,255,255,0.2);
  color: white;
}

#queue {
  margin-top: 10px;
  max-height: 120px;
  overflow-y: auto;
}

li {
  font-size: 13px;
  opacity: 0.6;
}

.now {
  font-weight: bold;
  opacity: 1;
}

#notify {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.2);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  opacity: 0;
  transition: 0.3s;
}

#notify.show { opacity: 1; }
</style>
</head>

<body>

<div class="container">

<div id="notify"></div>

<h3>🎤 點歌清單</h3>

<input id="nameInput" placeholder="名字">
<input id="songInput" placeholder="貼YouTube連結">

<button onclick="addSong()">加入清單</button>

<ul id="queue"></ul>

<button onclick="nextSong()">⏭ 下一首</button>

</div>

<audio id="notifySound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
let queue = [];
let currentIndex = 0;

async function addSong() {
  const name = document.getElementById("nameInput").value || "匿名";
  const url = document.getElementById("songInput").value;

  if (!url) return;

  let title = "讀取中...";
  let artist = "";

  try {
    const res = await fetch(`https://www.youtube.com/oembed?url=${url}&format=json`);
    const data = await res.json();

    const cleaned = cleanTitle(data.title);
    const parsed = parseArtistTitle(cleaned);

    artist = parsed.artist;
    title = parsed.title;

  } catch {
    title = "未知歌曲";
  }

  queue.push({ name, url, title, artist });
  renderQueue();

  showNotify(name, artist, title);
  document.getElementById("notifySound").play();

  document.getElementById("songInput").value = "";

  if (queue.length === 1) playSong();
}

// 清理標題
function cleanTitle(title) {
  return title
    .replace(/\(.*?\)|（.*?）/g, "")
    .replace(/\[.*?\]/g, "")
    .replace(/official|mv|music video|歌詞|lyrics/gi, "")
    .trim();
}

// ⭐ 分離歌手 + 歌名
function parseArtistTitle(text) {
  let artist = "未知";
  let title = text;

  if (text.includes(" - ")) {
    let parts = text.split(" - ");
    artist = parts[0];
    title = parts[1];
  } else if (text.includes("｜")) {
    let parts = text.split("｜");
    artist = parts[0];
    title = parts[1];
  }

  return { artist, title };
}

function renderQueue() {
  const list = document.getElementById("queue");
  list.innerHTML = "";

  queue.forEach((item, index) => {
    const li = document.createElement("li");

    li.innerText = `${index === currentIndex ? "▶️ " : ""}${item.name}｜${item.artist} - ${item.title}`;

    if (index === currentIndex) li.classList.add("now");

    list.appendChild(li);
  });
}

function showNotify(name, artist, title) {
  const box = document.getElementById("notify");
  box.innerHTML = `💖 ${name} 點了：${artist} - ${title}`;
  box.classList.add("show");

  setTimeout(() => {
    box.classList.remove("show");
  }, 2500);
}

function playSong() {
  if (currentIndex >= queue.length) return;

  let id = extractVideoID(queue[currentIndex].url);

  if (!id) return;

  let iframe = document.createElement("iframe");
  iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  iframe.style.display = "none";

  document.body.appendChild(iframe);
}

function nextSong() {
  currentIndex++;
  renderQueue();
  playSong();
}

function extractVideoID(url) {
  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }
  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }
  if (url.includes("shorts/")) {
    return url.split("shorts/")[1].split("?")[0];
  }
  return null;
}
</script>

</body>
</html>
