<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>珊珊KTV字幕 💖</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: "微軟正黑體";
}

#lyrics {
  position: absolute;
  bottom: 80px;
  width: 100%;
  text-align: center;
}

.line {
  font-size: 36px;
  color: rgba(255,255,255,0.5);
}

.active {
  font-size: 48px;
  color: #ff66cc;
  font-weight: bold;
  text-shadow: 0 0 15px #ff99dd;
}
</style>
</head>

<body>

<div id="lyrics">🎤 輸入歌名開始唱 💖</div>

<script>
let lyricsData = [];

async function loadLyrics(songName) {
  try {
    // 用免費歌詞API（可用但不保證每首）
    const res = await fetch(`https://api.lyrics.ovh/v1/${songName}/`);
    const data = await res.json();

    if (!data.lyrics) {
      document.getElementById("lyrics").innerText = "找不到歌詞 😢";
      return;
    }

    parseLyrics(data.lyrics);
  } catch {
    document.getElementById("lyrics").innerText = "歌詞載入失敗";
  }
}

function parseLyrics(text) {
  const lines = text.split("\n");

  lyricsData = lines.map((line, i) => ({
    time: i * 3, // 假時間（簡化版）
    text: line
  }));

  startLyrics();
}

function startLyrics() {
  let start = Date.now();

  setInterval(() => {
    let t = (Date.now() - start) / 1000;

    let current = lyricsData.findLast(l => t >= l.time);

    document.getElementById("lyrics").innerHTML =
      lyricsData.map(l =>
        `<div class="${l === current ? 'active' : 'line'}">${l.text}</div>`
      ).join("");
  }, 500);
}

// 👉 你之後可以改這行
loadLyrics("周杰倫 告白氣球");
</script>

</body>
</html>
