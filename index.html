<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>珊珊點歌小工具 💖</title>

<style>
body {
  margin: 0;
  font-family: "微軟正黑體";
  background: rgba(30,30,30,0.6);
  color: #f5f5f5;
}

.container {
  width: 300px;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

h3 {
  margin: 5px 0;
  text-align: center;
  font-weight: 500;
}

input {
  width: 100%;
  margin: 4px 0;
  padding: 6px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
}

button {
  width: 100%;
  padding: 7px;
  margin-top: 5px;
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

#queue {
  margin-top: 10px;
  max-height: 120px;
  overflow-y: auto;
}

li {
  font-size: 13px;
  opacity: 0.6;
}

.now {
  font-weight: bold;
  opacity: 1;
}
</style>
</head>

<body>

<div class="container">
<h3>🎤 點歌清單</h3>

<input id="nameInput" placeholder="名字">
<input id="songInput" placeholder="貼YouTube連結">

<button onclick="addSong()">加入清單</button>

<ul id="queue"></ul>

<button onclick="nextSong()">⏭ 下一首</button>
</div>

<script>
let queue = [];
let currentIndex = 0;

function addSong() {
  const name = document.getElementById("nameInput").value || "匿名";
  const song = document.getElementById("songInput").value;

  if (!song) return;

  queue.push({ name, song });
  renderQueue();

  document.getElementById("songInput").value = "";

  if (queue.length === 1) playSong();
}

function renderQueue() {
  const list = document.getElementById("queue");
  list.innerHTML = "";

  queue.forEach((item, index) => {
    const li = document.createElement("li");
    li.innerText = `${index === currentIndex ? "▶️ " : ""}${item.name}`;
    if (index === currentIndex) li.classList.add("now");
    list.appendChild(li);
  });
}

function playSong() {
  if (currentIndex >= queue.length) return;

  let url = queue[currentIndex].song;
  let id = extractVideoID(url);

  if (!id) {
    alert("❌ 這個連結抓不到影片！");
    return;
  }

  let iframe = document.createElement("iframe");
  iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  iframe.style.display = "none";

  document.body.appendChild(iframe);
}

function nextSong() {
  currentIndex++;
  renderQueue();
  playSong();
}

// ⭐⭐⭐ 重點：這裡已經修好所有YouTube連結 ⭐⭐⭐
function extractVideoID(url) {
  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }

  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }

  if (url.includes("shorts/")) {
    return url.split("shorts/")[1].split("?")[0];
  }

  return null;
}
</script>

</body>
</html>
