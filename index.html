<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>珊珊點歌小工具 💖</title>

<style>
body {
  margin: 0;
  font-family: "微軟正黑體";
  background: rgba(30,30,30,0.6);
  color: #f5f5f5;
}

.container {
  width: 300px;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

h3 {
  text-align: center;
  font-weight: 500;
}

input, button {
  width: 100%;
  margin: 4px 0;
  padding: 6px;
  border-radius: 8px;
  border: none;
}

button {
  background: rgba(255,255,255,0.2);
  color: white;
}

#queue {
  margin-top: 10px;
  max-height: 120px;
  overflow-y: auto;
}

li {
  font-size: 13px;
  opacity: 0.6;
}

.now {
  font-weight: bold;
  opacity: 1;
}

/* 🎉 通知 */
#notify {
  position: fixed;
  top: 20px;
  right: -300px;
  width: 250px;
  padding: 15px;
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  transition: 0.5s;
}

#notify.show {
  right: 20px;
}
</style>
</head>

<body>

<div class="container">
<h3>🎤 點歌清單</h3>

<input id="nameInput" placeholder="名字">
<input id="songInput" placeholder="YouTube連結">

<button onclick="addSong()">加入清單</button>

<ul id="queue"></ul>

<button onclick="nextSong()">⏭ 下一首</button>
</div>

<div id="notify"></div>

<script>
let queue = [];
let currentIndex = 0;

function addSong() {
  const name = document.getElementById("nameInput").value || "匿名";
  const song = document.getElementById("songInput").value;

  if (!song) return;

  queue.push({ name, song });
  renderQueue();
  showNotify(name, song);

  document.getElementById("songInput").value = "";

  if (queue.length === 1) playSong();
}

function renderQueue() {
  const list = document.getElementById("queue");
  list.innerHTML = "";

  queue.forEach((item, index) => {
    const li = document.createElement("li");
    li.innerText = `${index === currentIndex ? "▶️ " : ""}${item.name}`;
    if (index === currentIndex) li.classList.add("now");
    list.appendChild(li);
  });
}

function showNotify(name, song) {
  const box = document.getElementById("notify");
  box.innerHTML = `💖 ${name} 點了一首歌！`;
  box.classList.add("show");

  setTimeout(() => {
    box.classList.remove("show");
  }, 3000);
}

function playSong() {
  let url = queue[currentIndex].song;
  let id = url.match(/v=([^&]+)/);
  if (!id) return;

  let iframe = document.createElement("iframe");
  iframe.src = `https://www.youtube.com/embed/${id[1]}?autoplay=1`;
  iframe.style.display = "none";
  document.body.appendChild(iframe);
}

function nextSong() {
  currentIndex++;
  renderQueue();
  playSong();
}
</script>

</body>
</html>
